<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>津馬風格訂餐</title>

  <style>
    body {
      font-family: sans-serif;
      background: #f5f5f5;
      text-align: center;
    }

    h1 {
      margin: 20px;
    }

    .menu {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
    }

    .card {
      background: white;
      width: 220px;
      margin: 15px;
      border-radius: 15px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      overflow: hidden;
    }

    .card img {
      width: 100%;
      height: 150px;
      object-fit: cover;
    }

    .card h3 {
      margin: 10px;
    }

    .card p {
      color: #666;
    }

    button {
      margin: 10px;
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: #00c300;
      color: white;
      font-size: 16px;
    }

    button:hover {
      background: #00a000;
    }
  </style>
</head>

<body>

<h1>🍱 今日便當</h1>

<div class="menu">

  <div class="card">
    <img src="https://images.unsplash.com/photo-1604908176997-431a3b94c3f0">
    <h3>雞排便當</h3>
    <p>$100</p>
    <button onclick="order('雞排便當')">點餐</button>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1559847844-5315695dadae">
    <h3>排骨便當</h3>
    <p>$100</p>
    <button onclick="order('排骨便當')">點餐</button>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1604909052743-94e838986d24">
    <h3>滷肉飯</h3>
    <p>$60</p>
    <button onclick="order('滷肉飯')">點餐</button>
  </div>

</div>

<script>
function order(food){
  // ⚠️ 這裡換成你的 Google 表單
  const formURL = "https://docs.google.com/forms/d/e/你的表單ID/viewform?usp=pp_url";

  // entry.xxx 要換成你的欄位ID
  window.location.href = formURL + "&entry.123456=" + food;
}
</script>

</body>
</html>
